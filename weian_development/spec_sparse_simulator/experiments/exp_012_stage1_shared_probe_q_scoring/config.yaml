# Exp 012 Stage 2: Shared Probe + Magnitude-Aware Scoring + K-means Init

experiment:
  name: "exp_012_stage2_magnitude_aware"
  description: "Stage 2: Shared probes with magnitude-aware scoring (K-side + Q-side magnitude terms + biases)"

model:
  num_bins: 128
  num_kernels: 3
  num_freqs: 64  # head_dim / 2
  head_dim: 128
  use_kmeans_init: true  # Use K-means cluster centers to initialize probes
  # Stage 2: K-side = dot product + u^T * m^K + k_bias
  # Stage 2: Q-side = tilde_w^T * d + v^T * m^Q + c

training:
  epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  round_window: 128
  exclude_tail: 1000
  save_every: 10
  log_every: 10

data:
  trace_path: "data/qk.pt"
  test_trace_path: "data/qk_test.pt"
  head_sample_file: "../../hybrid_sample_heads_lowret_top10.json"

evaluation:
  topk_K: [50, 500, 1000]
  round_window: 128

output:
  base_dir: "output"
  logs_dir: "output/logs"
  checkpoints_dir: "output/checkpoints"
  results_dir: "output/results"
