# Exp 006: Module 2 Reverse Cross-Trace Validation Configuration

experiment:
  name: "exp_006_module2_reverse_cross_trace_validation"
  description: "Module 2 Reverse Cross-Trace Validation - Train on Trace B, Test on Trace A"

model:
  num_bins: 128
  num_kernels: 3
  num_freqs: 64  # head_dim / 2
  head_dim: 128
  # NO MLP, NO PositionScaling

training:
  epochs: 25
  learning_rate: 0.001
  optimizer: "adam"
  round_window: 128
  exclude_tail: 1000
  save_every: 10
  log_every: 10

data:
  trace_path: "data/qk.pt"
  test_trace_path: "data/qk_test.pt"
  head_sample_file: "../../hybrid_sample_heads_lowret_top10.json"

evaluation:
  topk_K: [50, 500, 1000]
  round_window: 128

output:
  base_dir: "output"
  logs_dir: "output/logs"
  checkpoints_dir: "output/checkpoints"
  results_dir: "output/results"
