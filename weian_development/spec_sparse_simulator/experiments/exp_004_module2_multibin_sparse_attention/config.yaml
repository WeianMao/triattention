# Exp 004: Module 2 Multi-Bin Sparse Attention Configuration

experiment:
  name: "exp_004_module2_multibin_sparse_attention"
  description: "Module 2 Position-Aware Attention Router POC"

model:
  num_bins: 128
  num_kernels: 3
  num_freqs: 64  # head_dim / 2
  head_dim: 128
  # NO MLP, NO PositionScaling

training:
  epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  round_window: 128
  exclude_tail: 1000
  save_every: 10
  log_every: 10

data:
  trace_path: "data/qk.pt"
  head_sample_file: "../../hybrid_sample_heads_lowret_top10.json"

evaluation:
  topk_K: [50, 500, 1000]
  round_window: 128

output:
  base_dir: "output"
  logs_dir: "output/logs"
  checkpoints_dir: "output/checkpoints"
  results_dir: "output/results"
