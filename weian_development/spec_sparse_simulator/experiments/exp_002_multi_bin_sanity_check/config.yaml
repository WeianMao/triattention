# Experiment 002: Multi-Bin Key Assignment Sanity Check Configuration

experiment:
  name: "multi_bin_sanity_check"
  description: "Verify Multi-Bin Key Assignment loss functions (softmax over keys)"
  seed: 42

model:
  num_queries: 6000
  num_keys: 6000
  num_bins: 128

training:
  epochs: 1000
  lr: 0.01
  log_interval: 100

# TopK sweep parameters (from doc 06 Section 4.1)
topk_k: [50, 500, 1000]

output:
  save_checkpoints: false
  save_results: true
  generate_figures: true
